name: CI

on:
  push:
  pull_request:

jobs:
  workspace:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Docs
        run: cargo doc --workspace --no-deps

  system-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure upstream system build
        run: >
          cmake -S crates/jpegli-sys/vendor/jpegli -B /tmp/jpegli-system
          -DBUILD_TESTING=OFF
          -DBUILD_SHARED_LIBS=OFF
          -DJPEGXL_ENABLE_BENCHMARK=OFF
          -DJPEGXL_ENABLE_DEVTOOLS=OFF
          -DJPEGXL_ENABLE_DOXYGEN=OFF
          -DJPEGXL_ENABLE_FUZZERS=OFF
          -DJPEGXL_ENABLE_JNI=OFF
          -DJPEGXL_ENABLE_JPEGLI_LIBJPEG=OFF
          -DJPEGXL_ENABLE_MANPAGES=OFF
          -DJPEGXL_ENABLE_OPENEXR=OFF
          -DJPEGXL_ENABLE_SJPEG=OFF
          -DJPEGXL_ENABLE_TCMALLOC=OFF
          -DJPEGXL_ENABLE_TOOLS=OFF

      - name: Build upstream system library
        run: cmake --build /tmp/jpegli-system --target jpegli-static --config Release

      - name: Build against system JPEGli
        env:
          JPEGLI_SYS_USE_SYSTEM: "1"
          JPEGLI_SYS_ROOT: /tmp/jpegli-system
        run: cargo build --workspace --no-default-features --features system,static
